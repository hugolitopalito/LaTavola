<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Mesas - La Tavola</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #fff; padding: 20px; }
        header { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .btn-voltar { background: #333; color: #fff; text-decoration: none; padding: 8px 15px; border-radius: 4px; display: inline-block; margin-bottom: 20px; }
        
        /* Legenda */
        .legenda { display: flex; gap: 20px; margin-bottom: 30px; font-size: 0.9em; }
        .legenda-item { display: flex; align-items: center; gap: 8px; }
        .box-color { width: 15px; height: 15px; border-radius: 4px; }
        
        /* Grid das Mesas */
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        
        /* Design do Cartão da Mesa */
        .mesa-card { border-radius: 8px; padding: 20px; text-align: center; border: 1px solid #333; position: relative; }
        .mesa-numero { font-size: 2em; font-weight: bold; margin-bottom: 10px; }
        .mesa-status { font-weight: bold; margin-bottom: 10px; font-size: 0.9em; }
        .mesa-capacidade { color: #aaa; font-size: 0.8em; margin-bottom: 15px; }
        .mesa-info { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; font-size: 0.8em; color: #ccc; }
        .mesa-total { color: #d4af37; font-weight: bold; font-size: 1.2em; margin-top: 5px; }
        
        /* Cores Dinâmicas */
        .livre { background-color: #1e3b26; border-color: #2ecc71; }
        .ocupada { background-color: #3b1e1e; border-color: #e74c3c; }
        .aguardando { background-color: #3b331e; border-color: #f1c40f; }
    </style>
</head>
<body>

    <header>
        <h2>Controle de Mesas</h2>
    </header>

    <a href="../Recepcao.html" class="btn-voltar">← Voltar</a>

    <div class="legenda">
        <div class="legenda-item"><div class="box-color" style="background: #2ecc71;"></div> Livre</div>
        <div class="legenda-item"><div class="box-color" style="background: #e74c3c;"></div> Ocupada</div>
        <div class="legenda-item"><div class="box-color" style="background: #f1c40f;"></div> Aguardando Pagamento</div>
    </div>

    <div class="grid-mesas" id="gridMesas">
        <p style="color: #aaa;">Carregando layout das mesas...</p>
    </div>

    <script type="module" src="./Mesas.js"></script>
</body>
</html>
