<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrir Comanda - La Tavola</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; max-width: 600px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .btn-voltar { background: #333; color: #fff; text-decoration: none; padding: 8px 15px; border-radius: 4px; display: inline-block; margin-bottom: 20px; }
        
        .form-container { background: #222; border: 1px solid #333; padding: 30px; border-radius: 8px; width: 100%; max-width: 600px; }
        .form-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .icon-comanda { background: #3a2a1a; color: #d4af37; padding: 15px; border-radius: 8px; font-size: 1.5em; font-weight: bold; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9em; font-weight: bold; }
        input, select { width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
        input:focus, select:focus { border-color: #d4af37; outline: none; }
        
        .botoes { display: flex; gap: 15px; margin-top: 30px; }
        .btn-cancelar { flex: 1; background: #333; color: #fff; border: none; padding: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-abrir { flex: 1; background: #5a1a1a; color: #fff; border: none; padding: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h2>Abrir Comanda</h2>
    </header>

    <div style="width: 100%; max-width: 600px;">
        <a href="../Recepcao.html" class="btn-voltar">← Voltar</a>
    </div>

    <div class="form-container">
        <div class="form-header">
            <div class="icon-comanda">🍽️</div>
            <div>
                <h3 style="margin: 0; font-size: 1.2em;">Nova Comanda</h3>
                <span style="color: #aaa; font-size: 0.85em;">Preencha os dados para abrir uma nova comanda</span>
            </div>
        </div>

        <form id="formComanda">
            <div class="form-group">
                <label>Número de Pessoas</label>
                <input type="number" id="qtdPessoas" min="1" max="10" placeholder="Ex: 2" required>
            </div>

            <div class="form-group">
                <label>Mesa</label>
                <select id="selectMesa" required>
                    <option value="">Selecione a quantidade de pessoas primeiro...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nome do Cliente (Opcional)</label>
                <input type="text" id="nomeCliente" placeholder="Ex: João Silva">
            </div>

            <div class="form-group">
                <label>Garçom Responsável</label>
                <input type="text" id="nomeGarcom" placeholder="Ex: João Santos" required>
            </div>

            <div class="botoes">
                <button type="button" class="btn-cancelar" onclick="window.location.href='../Recepcao.html'">Cancelar</button>
                <button type="submit" class="btn-abrir" id="btnSubmit">Abrir Comanda</button>
            </div>
        </form>
    </div>

    <script type="module" src="./Comanda.js"></script>
</body>
</html>
