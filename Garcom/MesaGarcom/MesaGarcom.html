<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Comanda - La Tavola</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #fff; padding: 20px; }
        header { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .btn-voltar { background: #333; color: #fff; text-decoration: none; padding: 8px 15px; border-radius: 4px; display: inline-block; margin-bottom: 20px; }
        
        /* Card Principal */
        .comanda-info { background: #222; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .info-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 15px; }
        .info-bottom { display: flex; justify-content: space-between; color: #aaa; font-size: 0.9em; }
        
        /* Botoes de Ação */
        .acoes-principais { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-add { flex: 1; background: #5a1a1a; color: #fff; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; }
        .btn-fechar { flex: 1; background: #d4af37; color: #000; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; }
        
        /* Abas */
        .abas { display: flex; gap: 10px; margin-bottom: 20px; }
        .aba { flex: 1; text-align: center; padding: 12px; background: #333; border-radius: 6px; cursor: pointer; color: #fff; border: 1px solid #444; }
        .aba.ativa { background: #d4af37; color: #000; font-weight: bold; border-color: #d4af37; }

        /* Lista de Itens */
        .secao-itens { background: #222; border-radius: 8px; border: 1px solid #333; padding: 20px; }
        .item-pedido { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 15px 0; }
        .item-pedido:last-child { border-bottom: none; }
        
        .tag-status { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75em; margin-top: 5px; }
        .tag-entregue { background: #1e4a28; color: #2ecc71; }
        .tag-preparo { background: #5c3a1e; color: #e67e22; }
        .tag-pendente { background: #444; color: #ccc; }
    </style>
</head>
<body>

    <header>
        <h2 style="margin: 0;">Comanda <span id="tituloComanda">...</span></h2>
    </header>

    <a href=".././Garcom.html" class="btn-voltar">← Voltar</a>

    <div class="comanda-info">
        <div class="info-top">
            <div style="display: flex; gap: 15px; align-items: center;">
                <strong style="color: #e74c3c; font-size: 1.2em;" id="txtNumeroCard">#...</strong>
                <div>
                    <strong style="font-size: 1.3em;" id="txtMesa">Carregando...</strong><br>
                    <span style="color: #aaa;" id="txtCliente">...</span>
                </div>
            </div>
            <div style="text-align: right;">
                <strong style="color: #d4af37; font-size: 1.8em;" id="txtTotal">R$ 0.00</strong><br>
                <span style="color: #aaa; font-size: 0.8em;">Total Parcial</span>
            </div>
        </div>
        <div class="info-bottom">
            <div>👥 Pessoas: <strong id="txtPessoas" style="color:#fff;">0</strong></div>
            <div>⏱️ Status: <strong id="txtStatus" style="color:#fff;">...</strong></div>
        </div>
    </div>

    <div class="acoes-principais">
        <button class="btn-add" id="btnAddItem">＋ Adicionar Item</button>
        <button class="btn-fechar" id="btnFecharConta">＄ Fechar Conta</button>
    </div>

    <div class="abas">
        <div class="aba ativa" id="abaTodos">Todos os Itens</div>
        <div class="aba" id="abaCadeiras">Por Cadeira</div>
    </div>

    <div class="secao-itens">
        <h3 style="margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px;">Itens do Pedido</h3>
        <div id="listaItensComanda">
            <p style="color: #aaa;">Nenhum item adicionado ainda.</p>
        </div>
    </div>

    <script type="module" src="./MesaGarcom.js"></script>
</body>
</html>
