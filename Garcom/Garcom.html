<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard do Garçom - La Tavola</title>
    <link rel="stylesheet" href="Garcom.css">
</head>
<body>

    <header>

        <div class="logo-area">
            <h1>La Tavola</h1>
            <span>Sistema de Gestão</span>
        </div>

        <div class="usuario-info">
            <strong id="headerNomeUsuario">Carregando...</strong><br>

            <span id="headerPerfilUsuario">
                ...
            </span>
        </div>

    </header>

    <h2>Garçom - Dashboard</h2>

    
    <div class="sugestao-box">

        <div class="icone-estrela">
            ☆
        </div>

        <div class="sugestao-conteudo">

            <strong class="titulo-sugestao">
                ⭐ Sugestão Estratégica do Dia
            </strong>

            <h3>
                Lasanha Bolonhesa
            </h3>

            <span class="info-produto">
                Pratos Principais • R$ 48.00 • Margem de 75%
            </span>

            <p class="texto-sugestao">
                💡 Produto com alta margem e popularidade. Incentive os clientes!
            </p>

        </div>

    </div>

    
    <div class="secao-mesas">

        <h3 class="titulo-mesas">
            Minhas Mesas Ocupadas
        </h3>

        <div id="listaMesasGarcom">

            <p class="texto-vazio">
                Nenhuma mesa ocupada no momento.
            </p>

        </div>

    </div>

    <script type="module" src="./Garcom.js"></script>

</body>
</html>
