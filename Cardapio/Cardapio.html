<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cardápio Delivery - La Tavola</title>
    <link rel="stylesheet" href="Cardapio.css" />
  </head>
  <body>
    <header>
      <h1>La Tavola</h1>
      <p>Faça seu pedido para Delivery</p>
    </header>
    <div class="filtros" id="botoesFiltro">
      <button class="ativo" data-categoria="Todos">Todos do Cardápio</button>
      <button data-categoria="Pratos Principais">Pratos Principais</button>
      <button data-categoria="Entradas">Entradas</button>
      <button data-categoria="Saladas">Saladas</button>
      <button data-categoria="Sobremesas">Sobremesas</button>
      <button data-categoria="Bebidas">Bebidas</button>
    </div>
    <main class="layout">
      <section class="produtos-container" id="listaCardapio">
        <p class="loading-cardapio">
          Carregando o cardápio mais gostoso da cidade...
        </p>
      </section>
      <aside class="carrinho-container">
        <h2>🛒 Seu Carrinho (<span id="qtdItensTop">0</span>)</h2>
        <div id="carrinhoVazio">
          <p class="icone-carrinho">🛵</p>
          <p class="texto-carrinho-vazio">
            Seu carrinho está vazio.<br />
            Adicione itens do cardápio ao lado.
          </p>
        </div>
        <div id="carrinhoCheio" class="escondido">
          <div id="itensDoCarrinho"></div>
          <div class="totais">
            <p>
              Subtotal:
              <span>R$ <span id="valorSubtotal">0.00</span></span>
            </p>
            <p>
              Taxa de Entrega:
              <span>R$ <span id="valorTaxa">0.00</span></span>
            </p>
            <h3>
              Total:
              <span>R$ <span id="valorTotal">0.00</span></span>
            </h3>
          </div>
          <div class="form-cliente">
            <label>Dados para Entrega</label>
            <input
              type="text"
              id="clienteNome"
              placeholder="Seu Nome Completo"
            />
            <input
              type="text"
              id="clienteTelefone"
              placeholder="Telefone (Whatsapp)"
            />
            <input
              type="text"
              id="clienteEndereco"
              placeholder="Endereço, Número e Complemento"
            />
            <input type="text" id="clienteBairro" placeholder="Seu Bairro" />
            <button id="btnFazerPedido">Confirmar Pedido</button>
          </div>
        </div>
      </aside>
    </main>
    <script type="module" src="./Cardapio.js"></script>
  </body>
</html>
